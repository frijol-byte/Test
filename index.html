<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TI4 Galactic Drafter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>TI4 Galactic Drafter</h1>
        
        <div class="setup-panel">
            <div class="setting">
                <label>Players:</label>
                <input type="number" id="playerCount" value="6" min="2" max="8">
            </div>
            <div class="setting">
                <label>Max Complexity:</label>
                <select id="complexity">
                    <option value="1">1 (Easy)</option>
                    <option value="2">2 (Medium)</option>
                    <option value="3" selected>3 (Hard)</option>
                </select>
            </div>
            <button id="btnDraft">Initialize Draft</button>
        </div>

        <div id="displayArea" class="results-grid">
            </div>
    </div>

    <script type="module" src="app.js"></script>

<script type="module">
    import { pickFactions, generateGalaxy } from './app.js';

    // This "listens" for the click and runs the code safely
    document.getElementById('btnDraft').addEventListener('click', () => {
        const config = {
            numPlayers: parseInt(document.getElementById('playerCount').value) || 6,
            maxComplexity: parseInt(document.getElementById('complexity').value) || 3,
            expansions: ["Base", "PoK", "Discordant", "Thunder's Edge"],
            minRes: 4, maxRes: 9, minInf: 4, maxInf: 9
        };

        try {
            const factions = pickFactions(config);
            const galaxy = generateGalaxy(config);
            renderResults(factions, galaxy);
        } catch (err) {
            console.error(err);
            alert("Error: " + err.message);
        }
    });

    function renderResults(draftPool) {
    const area = document.getElementById('displayArea');
    area.innerHTML = `
        <div class="pool-container">
            <div class="pool-column">
                <h2>Available Factions</h2>
                <div id="factionPool" class="pool-grid"></div>
            </div>
            <div class="pool-column">
                <h2>Available Slices</h2>
                <div id="slicePool" class="pool-grid"></div>
            </div>
        </div>
    `;

    // Populate Factions
    const fPool = document.getElementById('factionPool');
    draftPool.factions.forEach(f => {
        const div = document.createElement('div');
        div.className = 'pool-card faction-card';
        div.innerHTML = `<strong>${f.name}</strong><br><small>${f.expansion}</small>`;
        fPool.appendChild(div);
    });

    // Populate Slices
    const sPool = document.getElementById('slicePool');
    draftPool.slices.forEach((s, index) => {
        const div = document.createElement('div');
        div.className = 'pool-card slice-card';
        div.innerHTML = `
            <strong>Slice ${index + 1}</strong><br>
            <small>Res: ${s.stats.res} | Inf: ${s.stats.inf}</small>
        `;
        sPool.appendChild(div);
    });
}
</script>
</body>
</html>
